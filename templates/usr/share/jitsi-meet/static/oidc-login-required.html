<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Sign in required</title>
    <style>
      html, body {
        height: 100%;
        margin: 0;
      }
      body {
        background: #040404;
        color: #ffffff;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
          Oxygen, Ubuntu, Cantarell, "Helvetica Neue", Arial, sans-serif;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
        box-sizing: border-box;
      }
      .card {
        max-width: 420px;
        width: 100%;
        text-align: center;
        background: #1c1d21;
        border-radius: 12px;
        padding: 40px 32px;
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4);
      }
      .lock {
        width: 48px;
        height: 48px;
        margin: 0 auto 16px;
        display: block;
        opacity: 0.85;
      }
      h1 {
        font-size: 1.4rem;
        font-weight: 600;
        margin: 0 0 12px;
      }
      p {
        color: #c2c4c8;
        line-height: 1.5;
        margin: 0 0 24px;
      }
      button {
        background: #246fe5;
        color: #ffffff;
        border: none;
        padding: 12px 32px;
        border-radius: 6px;
        font-size: 1rem;
        font-weight: 500;
        cursor: pointer;
        transition: background 0.15s ease;
      }
      button:hover {
        background: #1d5fc4;
      }
      button:focus-visible {
        outline: 2px solid #ffffff;
        outline-offset: 2px;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <svg class="lock" viewBox="0 0 24 24" fill="none" stroke="currentColor"
        stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"
        aria-hidden="true">
        <rect x="4" y="11" width="16" height="10" rx="2" />
        <path d="M8 11V7a4 4 0 0 1 8 0v4" />
      </svg>
      <h1>Sign in required</h1>
      <p>
        This room is restricted to signed-in users. Please sign in with an
        authorized account to join. If you signed in but still can't access
        the room, try a different account.
      </p>
      <button type="button" onclick="signIn()">Sign in</button>
    </div>
    <script>
      function signIn() {
        const qs = new URLSearchParams(window.location.search);
        const path = encodeURIComponent(qs.get("path") || "/");
        const search = encodeURIComponent(qs.get("search") || "");
        const hash = encodeURIComponent(qs.get("hash") || "");
        window.location =
          `/oidc/auth?path=${path}&search=${search}&hash=${hash}`;
      }
    </script>
  </body>
</html>
